services:
  postgres:
    image: postgres:15-alpine
    container_name: myspeak_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: myspeak_user
      POSTGRES_PASSWORD: myspeak_password
      POSTGRES_DB: myspeak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - myspeak_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myspeak_user -d myspeak"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: myspeak_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://myspeak_user:myspeak_password@postgres:5432/myspeak?schema=public
      JWT_SECRET: dev-secret-key-change-in-production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - myspeak_network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: myspeak_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - myspeak_network

volumes:
  postgres_data:

networks:
  myspeak_network:
    driver: bridge
